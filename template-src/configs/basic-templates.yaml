# yamllint disable rule:line-length
---
template_families:
  basic_text:
    base: websocket-base
    description: "Basic text display with optional animation effects"
    external_js:
      - "vendor/anime.min.js"
    common_css:
      - obs-compatibility
      - vendor-fonts
      - basic-text
    common_websocket:
      - metadata-streaming

    templates:
      ws-basic-text:
        title: "Basic Text"
        description: "Simple text titlecard"
        body_layout: basic-text-layout
        display_js: basic-text-display

      ws-basic-text-fade:
        title: "Basic Text"
        description: "Simple text titlecard with fade"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [fade-effects]

      ws-basic-text-explode:
        title: "Basic Text"
        description: "Simple text titlecard with explode effect"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [explode-effects]

      ws-basic-text-spin:
        title: "Basic Text"
        description: "Simple text titlecard with spin effect"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [spin-effects]

      ws-basic-text-slide:
        title: "Basic Text"
        description: "Simple text titlecard with slide effect"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [slidedown-effects]

      ws-basic-text-anime-elastic:
        title: "Basic Text"
        description: "Simple text titlecard with elastic animation"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [anime-effects]

      ws-basic-text-anime-bounce:
        title: "Basic Text"
        description: "Simple text titlecard with bounce animation"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [anime-bounce]

      ws-basic-text-anime-stagger:
        title: "Basic Text"
        description: "Simple text titlecard with stagger animation"
        body_layout: basic-text-layout
        display_js: basic-text-display
        effects: [anime-advanced]

  generic_dj:
    base: websocket-base
    description: "Generic DJ titlecard with album art and accent color"
    common_css:
      - obs-compatibility
      - vendor-fonts
      - generic-dj-layout
    common_websocket:
      - metadata-streaming

    templates:
      ws-generic-dj:
        title: "Generic DJ"
        description: "DJ titlecard with album art, accent divider, and text"
        body_layout: generic-dj-layout
        display_js: generic-dj-display
