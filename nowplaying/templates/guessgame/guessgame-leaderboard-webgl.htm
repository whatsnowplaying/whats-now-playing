<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Guess Game Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            overflow: hidden;
            width: 550px;
            height: 700px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 550px; height: 700px;
            z-index: 0;
        }

        #panel {
            position: fixed;
            top: 0; left: 0;
            width: 550px; height: 700px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            padding: 24px 20px 20px;
            gap: 0;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        #header-icon {
            font-size: 28px;
            line-height: 1;
        }

        #header-text {
            flex: 1;
        }

        #header-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            /* accent color set by JS */
        }

        #header-sub {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-top: 2px;
        }

        /* ── Column headers ── */
        #col-heads {
            display: grid;
            grid-template-columns: 44px 1fr 64px 56px;
            padding: 0 6px 8px;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 6px;
        }

        #col-heads .c-rank   { text-align: center; }
        #col-heads .c-score  { text-align: right; }
        #col-heads .c-solves { text-align: right; }

        /* ── Rows ── */
        #rows {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .row {
            display: grid;
            grid-template-columns: 44px 1fr 64px 56px;
            align-items: center;
            padding: 10px 6px;
            border-radius: 6px;
            background: rgba(8, 8, 28, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0;
            transform: translateX(18px);
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.4s;
        }

        .row.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* Top-3 row accents */
        .row.rank-1 { border-color: rgba(255, 215,   0, 0.35); background: rgba(50, 40, 0, 0.65); }
        .row.rank-2 { border-color: rgba(192, 192, 192, 0.30); background: rgba(30, 30, 30, 0.65); }
        .row.rank-3 { border-color: rgba(205, 127,  50, 0.30); background: rgba(40, 20, 0, 0.65); }

        /* ── Rank badge ── */
        .r-rank {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rank-badge {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
        }

        .rank-badge.r1 { background: rgba(255,215,0,0.2);   color: #ffd700; border: 1px solid rgba(255,215,0,0.5);   font-size: 17px; }
        .rank-badge.r2 { background: rgba(192,192,192,0.2); color: #c0c0c0; border: 1px solid rgba(192,192,192,0.4); }
        .rank-badge.r3 { background: rgba(205,127,50,0.2);  color: #cd7f32; border: 1px solid rgba(205,127,50,0.4); }
        .rank-badge.rn { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid transparent; }

        /* ── Name ── */
        .r-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }

        .row.rank-1 .r-name { color: #ffd700; }
        .row.rank-2 .r-name { color: #d0d0d0; }
        .row.rank-3 .r-name { color: #cd9060; }

        /* ── Score ── */
        .r-score {
            text-align: right;
            font-size: 16px;
            font-weight: 700;
            /* accent color set by JS per type */
        }

        /* ── Solves ── */
        .r-solves {
            text-align: right;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }

        /* ── Empty state ── */
        #empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<canvas id="bgCanvas" width="550" height="700"></canvas>

<div id="panel">
    <div id="header">
        <div id="header-icon">🏆</div>
        <div id="header-text">
            <div id="header-title">Leaderboard</div>
            <div id="header-sub">Guess the Track</div>
        </div>
    </div>
    <div id="col-heads">
        <div class="c-rank">#</div>
        <div>Player</div>
        <div class="c-score">Score</div>
        <div class="c-solves">Solves</div>
    </div>
    <div id="rows"></div>
    <div id="empty" style="display:none">No scores yet</div>
</div>

<script src="guessgame-websocket.js"></script>
<script src="guessgame-webgl-bg.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────────
// URL params
// ─────────────────────────────────────────────
const params          = new URLSearchParams(window.location.search);
const leaderboardType = params.get('type') || 'session';
const portOverride    = params.get('port');
const dataField       = leaderboardType === 'all_time'
    ? 'all_time_leaderboard'
    : 'session_leaderboard';

// Accent colours per type
const ACCENT = leaderboardType === 'all_time' ? '#ffd700' : '#00ddff';

// Apply accent
document.getElementById('header-title').style.color = ACCENT;
document.getElementById('header-title').textContent =
    leaderboardType === 'all_time' ? 'All-Time Leaders' : 'Session Leaders';


// ─────────────────────────────────────────────
// Leaderboard rendering
// ─────────────────────────────────────────────
const rowsEl  = document.getElementById('rows');
const emptyEl = document.getElementById('empty');

const RANK_LABELS = { 1: '🥇', 2: '🥈', 3: '🥉' };
const RANK_CLASS  = { 1: 'r1',  2: 'r2',  3: 'r3' };

let lastEntriesKey = '';

function entriesKey(entries) {
    return entries.map(e => `${e.username}:${e.score}:${e.solves}:${e.rank}`).join('|');
}

function renderLeaderboard(entries) {
    if (!entries || entries.length === 0) {
        rowsEl.style.display = 'none';
        emptyEl.style.display = 'flex';
        lastEntriesKey = '';
        return;
    }

    // Skip rebuild if nothing changed — prevents periodic blink from re-animation
    const key = entriesKey(entries);
    if (key === lastEntriesKey) return;
    lastEntriesKey = key;

    rowsEl.style.display = 'flex';
    emptyEl.style.display = 'none';
    rowsEl.innerHTML = '';

    entries.forEach((entry, idx) => {
        const rank = entry.rank;
        const row  = document.createElement('div');
        row.className = 'row' + (rank <= 3 ? ` rank-${rank}` : '');

        const rankWrap = document.createElement('div');
        rankWrap.className = 'r-rank';
        const badge = document.createElement('div');
        badge.className = 'rank-badge ' + (RANK_CLASS[rank] || 'rn');
        badge.textContent = RANK_LABELS[rank] || rank;
        rankWrap.appendChild(badge);

        const nameEl = document.createElement('div');
        nameEl.className = 'r-name';
        nameEl.textContent = entry.username;

        const scoreEl = document.createElement('div');
        scoreEl.className = 'r-score';
        scoreEl.style.color = ACCENT;
        scoreEl.style.textShadow = `0 0 8px ${ACCENT}88`;
        scoreEl.textContent = entry.score.toLocaleString();

        const solvesEl = document.createElement('div');
        solvesEl.className = 'r-solves';
        solvesEl.textContent = entry.solves;

        row.appendChild(rankWrap);
        row.appendChild(nameEl);
        row.appendChild(scoreEl);
        row.appendChild(solvesEl);
        rowsEl.appendChild(row);

        setTimeout(() => row.classList.add('visible'), idx * 55 + 30);
    });
}

// ─────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────
function connect() {
    const sessionId = `${leaderboardType}_lb_${Date.now()}`;
    const ws = new WebSocket(
        buildWebSocketUrl(
            `/wsguessgamestream?session_id=${encodeURIComponent(sessionId)}`,
            portOverride
        )
    );

    ws.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            if (data.game_state) {
                renderLeaderboard(data.game_state[dataField]);
            } else {
                renderLeaderboard(data[dataField]);
            }
        } catch (err) {
            console.error('leaderboard parse error', err);
        }
    };

    ws.onclose = () => setTimeout(connect, 5000);
}

connect();
</script>
</body>
</html>
