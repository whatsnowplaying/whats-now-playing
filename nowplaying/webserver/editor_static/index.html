<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Template Editor — What's Now Playing</title>
<style>
:root {
  --bg: #0f0f17;
  --panel: #1a1a2e;
  --border: #2d2d4e;
  --accent: #4361ee;
  --accent-hover: #3a0ca3;
  --text: #e0e0e0;
  --text-dim: #888;
  --input-bg: #252540;
  --header-bg: #0a0a1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px; overflow: hidden; }
#app { display: flex; height: 100vh; }

/* ── Left panel ─────────────────────────────────────────────────────────── */
#left {
  width: 300px; min-width: 300px; background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#panel-header {
  background: var(--header-bg); padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
}
#panel-scroll {
  flex: 1; overflow-y: auto; padding: 6px 0;
}
#panel-scroll::-webkit-scrollbar { width: 5px; }
#panel-scroll::-webkit-scrollbar-track { background: transparent; }
#panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sel-section { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.sel-label {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
}
select {
  width: 100%; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 5px 8px; font-size: 13px; outline: none; cursor: pointer;
}
select:focus { border-color: var(--accent); }

/* ── Accordion ──────────────────────────────────────────────────────────── */
details { border-bottom: 1px solid var(--border); }
summary {
  padding: 7px 12px; cursor: pointer;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  user-select: none; list-style: none;
}
summary::-webkit-details-marker { display: none; }
summary::before {
  content: '▶'; font-size: 8px; transition: transform 0.15s; color: var(--accent);
}
details[open] > summary::before { transform: rotate(90deg); }
.group-content { padding: 3px 12px 8px; }

/* ── Var rows ────────────────────────────────────────────────────────────── */
.var-row {
  display: flex; align-items: center; padding: 3px 0; gap: 6px; min-height: 28px;
}
.var-label { flex: 1; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; }
.var-controls { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }

input[type="color"] {
  width: 26px; height: 22px; border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; padding: 1px; background: var(--input-bg);
}
.opacity-in {
  width: 38px; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 2px 4px; font-size: 11px; text-align: right;
}
.opacity-lbl { font-size: 10px; color: var(--text-dim); }

.toggle-sw { position: relative; width: 34px; height: 18px; cursor: pointer; }
.toggle-sw input { opacity: 0; width: 0; height: 0; }
.toggle-sl {
  position: absolute; inset: 0; background: var(--border);
  border-radius: 9px; transition: background 0.2s; cursor: pointer;
}
.toggle-sl::before {
  content: ''; position: absolute; width: 14px; height: 14px;
  left: 2px; top: 2px; background: white; border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-sw input:checked + .toggle-sl { background: var(--accent); }
.toggle-sw input:checked + .toggle-sl::before { transform: translateX(16px); }

.font-sel { width: 138px; font-size: 12px; }
.size-in {
  width: 68px; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 3px 6px; font-size: 12px; text-align: right;
}
.align-btns { display: flex; gap: 2px; }
.align-btn {
  width: 26px; height: 22px; background: var(--input-bg);
  border: 1px solid var(--border); border-radius: 3px;
  color: var(--text-dim); cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.align-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.shadow-in {
  width: 138px; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 3px 6px; font-size: 12px;
}

/* ── Timing section ─────────────────────────────────────────────────────── */
.timing-sec { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.timing-title {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px;
}
.timing-row { display: flex; align-items: center; padding: 2px 0; gap: 6px; }
.timing-lbl { flex: 1; font-size: 12px; color: var(--text); }
.timing-in {
  width: 56px; background: var(--input-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 3px 6px; font-size: 12px; text-align: right;
}
.timing-unit { font-size: 10px; color: var(--text-dim); width: 22px; }

/* ── Footer ─────────────────────────────────────────────────────────────── */
#panel-footer {
  padding: 9px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px;
}
.btn {
  flex: 1; padding: 7px; border: none; border-radius: 4px;
  font-size: 13px; cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.btn-reset {
  background: var(--input-bg); color: var(--text-dim); border: 1px solid var(--border);
}
.btn-reset:hover { background: #333355; color: var(--text); }
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { background: var(--accent-hover); }

/* ── Right panel ─────────────────────────────────────────────────────────── */
#right { flex: 1; position: relative; background: #111; overflow: hidden; }
#preview { width: 100%; height: 100%; border: none; display: block; }
#test-btn {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(67, 97, 238, 0.88); color: white;
  border: none; border-radius: 6px; padding: 8px 16px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  backdrop-filter: blur(4px); z-index: 10; transition: background 0.15s;
}
#test-btn:hover { background: rgba(58, 12, 163, 0.9); }

/* ── Toast ──────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1e3a5f; color: white;
  padding: 7px 20px; border-radius: 20px; font-size: 13px;
  transition: transform 0.25s ease; pointer-events: none; z-index: 100;
}
#toast.show { transform: translateX(-50%) translateY(0); }

.empty-msg { text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px; }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="panel-header">Template Editor</div>
    <div id="panel-scroll">
      <div class="sel-section">
        <div class="sel-label">Template</div>
        <select id="family-sel"><option>Loading…</option></select>
      </div>
      <div class="sel-section" id="effect-sec" style="display:none">
        <div class="sel-label">Effect</div>
        <select id="effect-sel"></select>
      </div>
      <div id="accordion"></div>
      <div class="timing-sec" id="timing-sec" style="display:none">
        <div class="timing-title">Timing</div>
        <div class="timing-row">
          <span class="timing-lbl">Hide after</span>
          <input class="timing-in" type="number" id="t-hide" min="0" max="3600" value="0">
          <span class="timing-unit">sec</span>
        </div>
        <div class="timing-row">
          <span class="timing-lbl">Repeat animation</span>
          <input class="timing-in" type="number" id="t-repeat" min="0" max="3600" value="0">
          <span class="timing-unit">sec</span>
        </div>
        <div class="timing-row">
          <span class="timing-lbl">Delay update</span>
          <input class="timing-in" type="number" id="t-delay" min="0" max="3600" value="0">
          <span class="timing-unit">sec</span>
        </div>
      </div>
    </div>
    <div id="panel-footer">
      <button class="btn btn-reset" id="btn-reset">Reset</button>
      <button class="btn btn-save" id="btn-save">Save</button>
    </div>
  </div>
  <div id="right">
    <iframe id="preview" src="about:blank" allow="autoplay"></iframe>
    <button id="test-btn">▶ Test</button>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

const FONTS = [
  'Bebas Neue', 'Orbitron', 'Rajdhani',
  'Montserrat', 'Heebo', 'Rubik',
  'Playfair Display', 'Kabel',
  'Arial', 'Helvetica', 'serif', 'sans-serif'
];

const GROUP_ORDER = ['Global','Title','Artist','Album','Label','Badge','Game'];

let currentStem = null;
let allVars = {};
let pendingVars = {};
let timingTimer = null;
let families = {};

// ── Colour helpers ────────────────────────────────────────────────────────

function parseColor(css) {
  if (!css) return { hex: '#000000', opacity: 100 };
  const s = css.trim();
  if (s === 'transparent' || s === 'none') return { hex: '#000000', opacity: 0 };
  const rgba = s.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)(?:\s*,\s*([\d.]+))?\s*\)$/);
  if (rgba) {
    const r = parseInt(rgba[1]), g = parseInt(rgba[2]), b = parseInt(rgba[3]);
    const a = rgba[4] !== undefined ? Math.round(parseFloat(rgba[4]) * 100) : 100;
    return { hex: '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join(''), opacity: a };
  }
  if (s.startsWith('#')) return { hex: s.length >= 7 ? s.slice(0,7) : s, opacity: 100 };
  return { hex: '#000000', opacity: 100 };
}

function buildColor(hex, opacity) {
  const op = Math.max(0, Math.min(100, parseInt(opacity) || 0));
  if (op === 0) return 'transparent';
  if (op === 100) return hex;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (op / 100).toFixed(2) + ')';
}

// ── Preview CSS injection ─────────────────────────────────────────────────

function injectVars() {
  const frame = document.getElementById('preview');
  try {
    const doc = frame.contentDocument;
    if (!doc || !doc.head) return;
    let style = doc.getElementById('wnp-editor-vars');
    if (!style) {
      style = doc.createElement('style');
      style.id = 'wnp-editor-vars';
      doc.head.appendChild(style);
    }
    const lines = Object.entries(pendingVars).map(([k, v]) => '  --' + k + ': ' + v + ';').join('\n');
    style.textContent = ':root {\n' + lines + '\n}';
  } catch (e) { /* cross-origin guard */ }
}

// ── Control builders ──────────────────────────────────────────────────────

function row(label) {
  const d = document.createElement('div');
  d.className = 'var-row';
  const l = document.createElement('span');
  l.className = 'var-label';
  l.textContent = label;
  d.appendChild(l);
  return d;
}

function controls() {
  const d = document.createElement('div');
  d.className = 'var-controls';
  return d;
}

function makeColor(name, info) {
  const { hex, opacity } = parseColor(info.user !== null && info.user !== undefined ? info.user : info.default);
  const d = row(info.label);
  const c = controls();

  const picker = document.createElement('input');
  picker.type = 'color';
  picker.value = hex;

  const opIn = document.createElement('input');
  opIn.className = 'opacity-in';
  opIn.type = 'number';
  opIn.min = 0; opIn.max = 100;
  opIn.value = opacity;
  opIn.title = 'Opacity %';

  const opLbl = document.createElement('span');
  opLbl.className = 'opacity-lbl';
  opLbl.textContent = '%';

  function onChange() {
    pendingVars[name] = buildColor(picker.value, opIn.value);
    injectVars();
  }
  picker.addEventListener('input', onChange);
  opIn.addEventListener('input', onChange);

  c.appendChild(picker);
  c.appendChild(opIn);
  c.appendChild(opLbl);
  d.appendChild(c);
  return d;
}

function makeToggle(name, info) {
  const cur = info.user !== null && info.user !== undefined ? info.user : info.default;
  const d = row(info.label);
  const sw = document.createElement('label');
  sw.className = 'toggle-sw';
  const inp = document.createElement('input');
  inp.type = 'checkbox';
  inp.checked = (cur !== 'none');
  const sl = document.createElement('span');
  sl.className = 'toggle-sl';
  sw.appendChild(inp);
  sw.appendChild(sl);
  inp.addEventListener('change', () => {
    pendingVars[name] = inp.checked ? 'block' : 'none';
    injectVars();
  });
  d.appendChild(sw);
  return d;
}

function makeFont(name, info) {
  const cur = (info.user !== null && info.user !== undefined ? info.user : info.default) || 'sans-serif';
  const d = row(info.label);
  const sel = document.createElement('select');
  sel.className = 'font-sel';
  let found = false;
  for (const f of FONTS) {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    if (cur === f || cur.startsWith(f + ',') || cur.startsWith('"' + f + '"')) {
      o.selected = true; found = true;
    }
    sel.appendChild(o);
  }
  if (!found) {
    const o = document.createElement('option');
    o.value = cur; o.textContent = cur; o.selected = true;
    sel.insertBefore(o, sel.firstChild);
  }
  sel.addEventListener('change', () => { pendingVars[name] = sel.value; injectVars(); });
  d.appendChild(sel);
  return d;
}

function makeSize(name, info) {
  const cur = (info.user !== null && info.user !== undefined ? info.user : info.default) || '24px';
  const d = row(info.label);
  const inp = document.createElement('input');
  inp.className = 'size-in';
  inp.type = 'text';
  inp.value = cur;
  inp.placeholder = '24px';
  inp.addEventListener('input', () => { pendingVars[name] = inp.value; injectVars(); });
  d.appendChild(inp);
  return d;
}

function makeAlign(name, info) {
  const cur = (info.user !== null && info.user !== undefined ? info.user : info.default) || 'left';
  const d = row(info.label);
  const c = controls();
  c.className = 'align-btns';
  for (const [val, icon, title] of [['left','⬅','Left'],['center','↔','Center'],['right','➡','Right']]) {
    const b = document.createElement('button');
    b.className = 'align-btn' + (val === cur ? ' active' : '');
    b.textContent = icon; b.title = title;
    b.addEventListener('click', () => {
      c.querySelectorAll('.align-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      pendingVars[name] = val;
      injectVars();
    });
    c.appendChild(b);
  }
  d.appendChild(c);
  return d;
}

function makeShadow(name, info) {
  const cur = (info.user !== null && info.user !== undefined ? info.user : info.default) || 'none';
  const d = row(info.label);
  const inp = document.createElement('input');
  inp.className = 'shadow-in';
  inp.type = 'text';
  inp.value = cur;
  inp.placeholder = 'none';
  inp.addEventListener('input', () => { pendingVars[name] = inp.value; injectVars(); });
  d.appendChild(inp);
  return d;
}

function makeVarRow(name, info) {
  switch (info.type) {
    case 'color':  return makeColor(name, info);
    case 'toggle': return makeToggle(name, info);
    case 'font':   return makeFont(name, info);
    case 'size':   return makeSize(name, info);
    case 'align':  return makeAlign(name, info);
    case 'shadow': return makeShadow(name, info);
    default:       return makeColor(name, info);
  }
}

// ── Accordion ─────────────────────────────────────────────────────────────

function buildAccordion() {
  const ac = document.getElementById('accordion');
  while (ac.firstChild) ac.removeChild(ac.firstChild);

  const groups = {};
  for (const [name, info] of Object.entries(allVars)) {
    const g = info.group || 'Global';
    if (!groups[g]) groups[g] = [];
    groups[g].push([name, info]);
  }

  let first = true;
  for (const gName of GROUP_ORDER) {
    const entries = groups[gName];
    if (!entries || !entries.length) continue;

    const det = document.createElement('details');
    if (first) { det.open = true; first = false; }

    const sum = document.createElement('summary');
    sum.textContent = gName;
    det.appendChild(sum);

    const content = document.createElement('div');
    content.className = 'group-content';
    for (const [name, info] of entries) {
      content.appendChild(makeVarRow(name, info));
    }
    det.appendChild(content);
    ac.appendChild(det);
  }

  if (!Object.keys(allVars).length) {
    const msg = document.createElement('div');
    msg.className = 'empty-msg';
    msg.textContent = 'No customisable variables for this template.';
    ac.appendChild(msg);
  }
}

// ── Load template vars ────────────────────────────────────────────────────

async function loadVars(stem) {
  const res = await fetch('/api/v1/editor/templates/' + stem + '/vars');
  if (!res.ok) return;
  allVars = await res.json();
  pendingVars = {};
  for (const [name, info] of Object.entries(allVars)) {
    pendingVars[name] = info.user !== null && info.user !== undefined ? info.user : info.default;
  }
  buildAccordion();
  injectVars();
}

async function loadTiming(stem) {
  const res = await fetch('/api/v1/editor/templates/' + stem + '/timing');
  if (!res.ok) return;
  const t = await res.json();
  document.getElementById('t-hide').value   = t.hide_after       || 0;
  document.getElementById('t-repeat').value = t.repeat_animation || 0;
  document.getElementById('t-delay').value  = t.delay_update     || 0;
  document.getElementById('timing-sec').style.display = '';
}

// ── Preview iframe ────────────────────────────────────────────────────────

function setPreview(stem) {
  const frame = document.getElementById('preview');
  frame.onload = () => { setTimeout(injectVars, 50); };
  frame.src = '/editor/' + stem + '.htm?preview';
}

// ── Family / Effect selectors ─────────────────────────────────────────────

async function loadFamilies() {
  const res = await fetch('/api/v1/editor/templates');
  if (!res.ok) return;
  families = await res.json();

  const fsel = document.getElementById('family-sel');
  while (fsel.firstChild) fsel.removeChild(fsel.firstChild);
  for (const f of Object.keys(families)) {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    fsel.appendChild(o);
  }
  if (fsel.options.length) onFamilyChange();
}

function onFamilyChange() {
  const family = document.getElementById('family-sel').value;
  const effects = families[family] || {};
  const names = Object.keys(effects);

  const esec = document.getElementById('effect-sec');
  const esel = document.getElementById('effect-sel');
  while (esel.firstChild) esel.removeChild(esel.firstChild);
  for (const e of names) {
    const o = document.createElement('option');
    o.value = e; o.textContent = e;
    esel.appendChild(o);
  }
  esec.style.display = names.length > 1 ? '' : 'none';
  onEffectChange();
}

function onEffectChange() {
  const family = document.getElementById('family-sel').value;
  const effect = document.getElementById('effect-sel').value;
  const stem = (families[family] || {})[effect];
  if (!stem) return;
  currentStem = stem;
  setPreview(stem);
  loadVars(stem);
  loadTiming(stem);
}

document.getElementById('family-sel').addEventListener('change', onFamilyChange);
document.getElementById('effect-sel').addEventListener('change', onEffectChange);

// ── Timing auto-save ──────────────────────────────────────────────────────

function saveTiming() {
  if (!currentStem) return;
  fetch('/api/v1/editor/templates/' + currentStem + '/timing', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      hide_after:        parseInt(document.getElementById('t-hide').value)   || 0,
      repeat_animation:  parseInt(document.getElementById('t-repeat').value) || 0,
      delay_update:      parseInt(document.getElementById('t-delay').value)  || 0,
    })
  });
}

['t-hide','t-repeat','t-delay'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    clearTimeout(timingTimer);
    timingTimer = setTimeout(saveTiming, 800);
  });
});

// ── Save / Reset ──────────────────────────────────────────────────────────

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

document.getElementById('btn-save').addEventListener('click', async () => {
  if (!currentStem) return;
  const res = await fetch('/api/v1/editor/templates/' + currentStem + '/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vars: pendingVars })
  });
  if (res.ok) { toast('Saved!'); saveTiming(); }
  else toast('Save failed.');
});

document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!currentStem) return;
  const res = await fetch('/api/v1/editor/templates/' + currentStem + '/reset', { method: 'POST' });
  if (res.ok) { toast('Reset to defaults.'); await loadVars(currentStem); }
  else toast('Reset failed.');
});

// ── Test button ───────────────────────────────────────────────────────────

document.getElementById('test-btn').addEventListener('click', () => {
  const frame = document.getElementById('preview');
  try {
    const win = frame.contentWindow;
    const last = win._wnpLastMeta;
    if (typeof win.updateDisplay === 'function') {
      win.updateDisplay(null);
      setTimeout(() => { if (last) win.updateDisplay(last); }, 400);
    }
  } catch (e) { /* cross-origin guard */ }
});

// ── Init ─────────────────────────────────────────────────────────────────

loadFamilies();
</script>
</body>
</html>
