# This workflow file generates binaries for both Windows
# and OS X.  However, https://github.com/actions/upload-artifact/issues/38
# that basically says that it won't ever preserve permissions.
# That means an archive in an archive since we need to preserve them
# on OS X.  Still... better than doing this all by hand.

# yamllint disable rule:line-length
---

name: pyinstaller

on: [push]  # yamllint disable-line rule:truthy

jobs:
  pyinstaller-macos-arm:
    uses: ./.github/workflows/macos-build.yml
    permissions:
      contents: read
    with:
      runs-on: macos-15
      artifact-name: macos15-arm-dist

  pyinstaller-macos-intel:
    uses: ./.github/workflows/macos-build.yml
    permissions:
      contents: read
    with:
      runs-on: macos-15-intel
      artifact-name: macos15-intel-dist


  pyinstaller-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: run builder
        run: ./builder.sh linuxbin
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: linux-dist
          path: "*.zip"

  pyinstaller-linux-smoke:
    needs: pyinstaller-linux
    runs-on: ubuntu-20.04
    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
      - name: smoke test binary
        run: |
          unzip "WhatsNowPlaying-*-Linux-*.zip"
          BINARY=$(find WhatsNowPlaying-*-Linux-* -name "WhatsNowPlaying" -type f | head -1)
          chmod +x "${BINARY}"
          "${BINARY}" --smoke-test

  pyinstaller-win:
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: run builder
        shell: bash
        run: |
          ./builder.sh
      - name: smoke test binary
        shell: bash
        run: |
          BINARY=$(find WhatsNowPlaying-*-Windows -name "WhatsNowPlaying.exe" | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: windows-dist
          # Windows builds create a directory, not a zip (see builder.sh line 146)
          path: "WhatsNowPlaying*windows"
