# This workflow file generates binaries for both Windows
# and OS X.  However, https://github.com/actions/upload-artifact/issues/38
# that basically says that it won't ever preserve permissions.
# That means an archive in an archive since we need to preserve them
# on OS X.  Still... better than doing this all by hand.

# yamllint disable rule:line-length
---

name: pyinstaller

on: [push]  # yamllint disable-line rule:truthy

jobs:
  pyinstaller-macos-arm:
    uses: ./.github/workflows/macos-build.yml
    secrets: inherit  # pragma: allowlist secret
    permissions:
      contents: read
    with:
      runs-on: macos-15
      artifact-name: macos15-arm-dist
      environment: >-
        ${{ (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/')) && 'macos-signing' || '' }}

  pyinstaller-macos-intel:
    uses: ./.github/workflows/macos-build.yml
    secrets: inherit  # pragma: allowlist secret
    permissions:
      contents: read
    with:
      runs-on: macos-15-intel
      artifact-name: macos15-intel-dist
      environment: >-
        ${{ (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/')) && 'macos-signing' || '' }}


  pyinstaller-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: run builder
        run: ./builder.sh linuxbin
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: linux-dist
          path: "*.zip"

  pyinstaller-linux-smoke:
    needs: pyinstaller-linux
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libqt6webenginecore6
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-dist
      - name: smoke test binary
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          unzip "WhatsNowPlaying-*-Linux-*.zip"
          BINARY=$(find WhatsNowPlaying-*-Linux-* -name "WhatsNowPlaying" -type f | head -1)
          chmod +x "${BINARY}"
          "${BINARY}" --smoke-test

  pyinstaller-win:
    runs-on: windows-2022
    environment: >-
      ${{ (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/windows_signing' ||
      startsWith(github.ref, 'refs/tags/')) && 'windows-signing' || '' }}
    permissions:
      contents: read
      id-token: write
    env:
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: run builder
        shell: bash
        run: |
          ./builder.sh
      - name: azure login
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: sign windows binary
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: com-whatsnowplaying-app
          certificate-profile-name: whatsnowplaying-cert-profile
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: verify windows signing
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        shell: powershell
        run: |
          $binary = Get-ChildItem -Recurse -Filter "WhatsNowPlaying.exe" | Select-Object -First 1
          $sig = Get-AuthenticodeSignature -FilePath $binary.FullName
          Write-Output "Status: $($sig.Status)"
          Write-Output "Subject: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { exit 1 }
      - name: smoke test binary
        shell: bash
        run: |
          BINARY=$(find WhatsNowPlaying-*-Windows -name "WhatsNowPlaying.exe" | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: windows-dist
          # Windows builds create a directory, not a zip (see builder.sh line 146)
          path: "WhatsNowPlaying*windows"
