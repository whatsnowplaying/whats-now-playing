# This workflow file generates binaries for both Windows
# and OS X.  However, https://github.com/actions/upload-artifact/issues/38
# that basically says that it won't ever preserve permissions.
# That means an archive in an archive since we need to preserve them
# on OS X.  Still... better than doing this all by hand.

# yamllint disable rule:line-length
---

name: pyinstaller

on: [push]  # yamllint disable-line rule:truthy

jobs:
  pyinstaller-macos-arm:
    uses: ./.github/workflows/macos-build.yml
    secrets: inherit  # pragma: allowlist secret
    permissions:
      contents: read
    with:
      runs-on: macos-15
      artifact-name: macos15-arm-dist
      environment: >-
        ${{ (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/')) && 'macos-signing' || '' }}

  pyinstaller-macos-intel:
    uses: ./.github/workflows/macos-build.yml
    secrets: inherit  # pragma: allowlist secret
    permissions:
      contents: read
    with:
      runs-on: macos-15-intel
      artifact-name: macos15-intel-dist
      environment: >-
        ${{ (github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/')) && 'macos-signing' || '' }}


  pyinstaller-linux:
    runs-on: ubuntu-latest
    environment: >-
      ${{ startsWith(github.ref, 'refs/tags/') && 'linux-signing' || '' }}
    permissions:
      contents: read
    env:
      # Hoisted to job level so env.RELEASE_TOKEN is visible to the
      # step-level if: condition below.
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: run builder
        run: ./builder.sh linuxbin
      - name: artifact dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: linux-dist
          path: "*.zip"

      # Release upload runs only inside the linux-signing environment
      # (active on tag pushes), which provides the RELEASE_TOKEN PAT
      # scoped to release-write on this repo only.
      - name: upload zip to GitHub Release
        if: ${{ env.RELEASE_TOKEN != '' && startsWith(github.ref, 'refs/tags/') }}
        uses: ./.github/actions/release-upload
        with:
          release_token: ${{ env.RELEASE_TOKEN }}
          tag: ${{ github.ref_name }}

  pyinstaller-linux-smoke:
    needs: pyinstaller-linux
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libfontconfig1 \
            libglib2.0-0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libqt6webenginecore6
      - name: download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: linux-dist
      - name: smoke test binary
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          unzip "WhatsNowPlaying-*-Linux-*.zip"
          BINARY=$(find WhatsNowPlaying-*-Linux-* -name "WhatsNowPlaying" -type f | head -1)
          chmod +x "${BINARY}"
          "${BINARY}" --smoke-test

  pyinstaller-win:
    runs-on: windows-2025
    environment: >-
      ${{ (github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/windows_signing' ||
      startsWith(github.ref, 'refs/tags/')) && 'windows-signing' || '' }}
    permissions:
      contents: read
      id-token: write
    env:
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      # Hoisted to job level so env.RELEASE_TOKEN is visible to step-level
      # if: conditions on the zip + verify + upload steps below.
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7
        with:
          python-version: '3.12'
      - name: run builder
        shell: bash
        run: |
          ./builder.sh
      - name: azure login
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: sign windows binary
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/artifact-signing-action@c7ab2a863ab5f9a846ddb8265964877ef296ee82  # v2.0.0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: com-whatsnowplaying-app
          certificate-profile-name: whatsnowplaying-cert-profile
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: verify windows signing
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        shell: powershell
        run: |
          $binary = Get-ChildItem -Recurse -Filter "WhatsNowPlaying.exe" | Select-Object -First 1
          $sig = Get-AuthenticodeSignature -FilePath $binary.FullName
          Write-Output "Status: $($sig.Status)"
          Write-Output "Subject: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { exit 1 }
      - name: smoke test binary
        shell: bash
        run: |
          BINARY=$(find WhatsNowPlaying-*-Windows -name "WhatsNowPlaying.exe" | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: windows-dist
          # Windows builds create a directory, not a zip (see builder.sh line 146)
          path: "WhatsNowPlaying*windows"

      # Windows zip is produced here (post-signing) rather than in
      # builder.sh because the signing step has to run against the
      # unpacked directory.
      - name: zip windows dist for release
        if: ${{ env.RELEASE_TOKEN != '' && startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          DIR=$(find . -maxdepth 1 -type d -name "WhatsNowPlaying-*-Windows" | head -1)
          if [[ -z "$DIR" ]]; then
            echo "Windows dist directory not found" >&2
            exit 1
          fi
          # Strip leading ./ so the archive doesn't contain it.
          DIR="${DIR#./}"
          7z a -tzip "${DIR}.zip" "${DIR}"

      # Mirror the macOS zip-roundtrip verification: extract the zip
      # we just made into a fresh location and check the Authenticode
      # signature on the main exe.  The runner's in-place verification
      # earlier in the job has been shown to mask issues that only
      # appear after the zip+extract path users actually exercise.
      # Gated only on RELEASE_TOKEN (signing-env active + tag push) —
      # AZURE_CLIENT_ID gates the actual signing earlier; if we got
      # here in the signing env, the binary should be signed and the
      # verification should run.
      - name: verify signed bundle survives zip round-trip
        if: ${{ env.RELEASE_TOKEN != '' && startsWith(github.ref, 'refs/tags/') }}
        shell: powershell
        run: |
          $zip = Get-ChildItem -Filter "WhatsNowPlaying-*-Windows.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "No Windows zip found to verify"
            exit 1
          }
          $extract = Join-Path $env:RUNNER_TEMP "verify-extract"
          if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
          New-Item -ItemType Directory -Path $extract | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath $extract -Force
          $exe = Get-ChildItem -Recurse -Path $extract -Filter "WhatsNowPlaying.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "WhatsNowPlaying.exe not found inside $($zip.Name)"
            exit 1
          }
          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          Write-Output "Status:  $($sig.Status)"
          Write-Output "Subject: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            Write-Error "Extracted bundle's WhatsNowPlaying.exe has signature status: $($sig.Status)"
            exit 1
          }
          Remove-Item -Recurse -Force $extract

      # Release upload runs only inside the windows-signing environment
      # (active on tag pushes), which provides the RELEASE_TOKEN PAT
      # scoped to release-write on this repo only.
      - name: upload zip to GitHub Release
        if: ${{ env.RELEASE_TOKEN != '' && startsWith(github.ref, 'refs/tags/') }}
        uses: ./.github/actions/release-upload
        with:
          release_token: ${{ env.RELEASE_TOKEN }}
          tag: ${{ github.ref_name }}
          zip_glob: WhatsNowPlaying-*-Windows.zip
