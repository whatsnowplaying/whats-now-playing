# Reusable workflow for macOS PyInstaller builds.
# Called by pyinstaller.yaml with different runner/artifact-name
# per architecture.

# yamllint disable rule:line-length
---

name: macos-build

on:  # yamllint disable-line rule:truthy
  workflow_call:  # yamllint disable-line rule:truthy
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.12'
      macos-deployment-target:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: icu
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ inputs.macos-deployment-target }}
        run: |
          brew update --preinstall || true
          brew install pkg-config
          if [[ -n "$MACOSX_DEPLOYMENT_TARGET" ]]; then
            # Homebrew overrides MACOSX_DEPLOYMENT_TARGET in its own build subprocess,
            # so we replicate the formula's build directly where our flags are respected.
            # We install into the existing Homebrew Cellar path so PyICU and PyInstaller
            # find ICU at the expected locations without any path changes.
            brew install icu4c
            ICU_VERSION=$(brew list --versions icu4c@78 | awk '{print $2}')
            ICU_PREFIX=$(brew --cellar icu4c@78)/${ICU_VERSION}
            echo "Building ICU ${ICU_VERSION} targeting macOS ${MACOSX_DEPLOYMENT_TARGET}"
            curl -fL \
              "https://github.com/unicode-org/icu/releases/download/release-${ICU_VERSION}/icu4c-${ICU_VERSION}-sources.tgz" \
              -o /tmp/icu4c-src.tgz
            tar xzf /tmp/icu4c-src.tgz -C /tmp
            cd /tmp/icu/source
            CFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}" \
            CXXFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}" \
            LDFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}" \
            ./configure \
              --prefix="${ICU_PREFIX}" \
              --disable-samples \
              --disable-tests \
              --enable-static \
              --with-library-bits=64
            make -j"$(sysctl -n hw.ncpu)"
            make install
            echo "=== ICU deployment target after custom build ==="
            vtool -show-build "${ICU_PREFIX}/lib/libicuuc.dylib"
          else
            brew install icu4c
          fi
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: xcode sdk diagnostics
        run: xcodebuild -showsdks
      - name: python diagnostics
        run: |
          python3 --version
          python3 -c "import sysconfig; print('Python deployment target:', sysconfig.get_config_var('MACOSX_DEPLOYMENT_TARGET'))"
          python3 -c "import platform; print('Platform:', platform.platform())"
          echo "MACOSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET:-<not set>}"
      - name: run builder
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ inputs.macos-deployment-target }}
        run: |
          [[ -z "$MACOSX_DEPLOYMENT_TARGET" ]] && unset MACOSX_DEPLOYMENT_TARGET
          export PATH="$(brew --prefix)/opt/icu4c/bin:$(brew --prefix)/opt/icu4c/sbin:$PATH"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$(brew --prefix)/opt/icu4c/lib/pkgconfig"
          ./builder.sh
      - name: check binary deployment target
        run: |
          APPDIR=$(find WhatsNowPlaying-* -name "WhatsNowPlaying.app" -type d | head -1)
          echo "=== Main binary ==="
          vtool -show-build "${APPDIR}/Contents/MacOS/WhatsNowPlaying"
          echo ""
          echo "=== Bundled app dylibs ==="
          find "${APPDIR}" -name "*.dylib" | sort | while read -r lib; do
            minos=$(vtool -show-build "$lib" 2>/dev/null | awk '/minos/ {print $2}')
            echo "${minos}  $(basename "$lib")"
          done | sort
          echo ""
          echo "=== Venv dylibs ==="
          find /tmp/build-venv -name "*.dylib" -o -name "*.so" | sort | while read -r lib; do
            minos=$(vtool -show-build "$lib" 2>/dev/null | awk '/minos/ {print $2}')
            echo "${minos}  ${lib#/tmp/build-venv/}"
          done | sort
      - name: smoke test binary
        run: |
          BINARY=$(find WhatsNowPlaying-* -path "*/Contents/MacOS/WhatsNowPlaying" -type f | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: "*.zip"
