# Reusable workflow for macOS PyInstaller builds.
# Called by pyinstaller.yaml with different runner/artifact-name
# per architecture.

# yamllint disable rule:line-length
---

name: macos-build

on:  # yamllint disable-line rule:truthy
  workflow_call:  # yamllint disable-line rule:truthy
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: '3.12'
      macos-deployment-target:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - name: icu
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ inputs.macos-deployment-target }}
        run: |
          brew update --preinstall || true
          brew install pkg-config
          if [[ -n "$MACOSX_DEPLOYMENT_TARGET" ]]; then
            brew reinstall --build-from-source icu4c
          else
            brew install icu4c
          fi
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: run builder
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ inputs.macos-deployment-target }}
        run: |
          [[ -z "$MACOSX_DEPLOYMENT_TARGET" ]] && unset MACOSX_DEPLOYMENT_TARGET
          export PATH="$(brew --prefix)/opt/icu4c/bin:$(brew --prefix)/opt/icu4c/sbin:$PATH"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$(brew --prefix)/opt/icu4c/lib/pkgconfig"
          ./builder.sh
      - name: smoke test binary
        run: |
          BINARY=$(find WhatsNowPlaying-* -path "*/Contents/MacOS/WhatsNowPlaying" -type f | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: "*.zip"
