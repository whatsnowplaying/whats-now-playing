# Reusable workflow for macOS PyInstaller builds.
# Called by pyinstaller.yaml with different runner/artifact-name
# per architecture.

# yamllint disable rule:line-length
---

name: macos-build

on:  # yamllint disable-line rule:truthy
  workflow_call:  # yamllint disable-line rule:truthy
    inputs:
      runs-on:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      environment:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
    steps:
      - name: cpu diagnostics
        run: |
          echo "=== CPU info ==="
          sysctl -n machdep.cpu.brand_string
          echo "=== Load average ==="
          uptime
          echo "=== Top CPU consumers ==="
          ps aux --sort=-%cpu 2>/dev/null | head -20 || ps aux | sort -rk3 | head -20
      - name: icu
        run: |
          brew update --preinstall || true
          brew install pkg-config icu4c
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: update tags
        run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: import signing certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PWD=$(openssl rand -base64 32)
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          # No -l (lock on sleep) and no -t (timeout) = never lock
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          rm -f /tmp/certificate.p12
      - name: run builder
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export PATH="$(brew --prefix)/opt/icu4c/bin:$(brew --prefix)/opt/icu4c/sbin:$PATH"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$(brew --prefix)/opt/icu4c/lib/pkgconfig"
          ./builder.sh
      - name: smoke test binary
        run: |
          BINARY=$(find WhatsNowPlaying-* -path "*/Contents/MacOS/WhatsNowPlaying" -type f | head -1)
          "${BINARY}" --smoke-test
      - name: artifact dist
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: "*.zip"
